<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MARUKA - 마루카 부족</title>
<style>
  @import url('https://cdn.jsdelivr.net/npm/galmuri@latest/dist/galmuri.css');

  :root{
    --wood-dark:#2b1c12;
    --wood:#4a3320;
    --wood-light:#8a6b45;
    --parchment:#f1e2c2;
    --accent:#e0a13a;
    --accent2:#c9762e;
    --shadow: rgba(0,0,0,.55);
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0; padding:0;
    width:100%; height:100%;
    background:#0a0f0a;
    font-family:'Galmuri11','Galmuri9',monospace;
    overflow:hidden;
    -webkit-tap-highlight-color: transparent;
    user-select:none;
  }

  #app{
    position:fixed; inset:0;
    width:100%; height:100%;
  }

  /* ---------- COVER PAGE ---------- */
  #cover{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    z-index:20;
    transition: opacity .6s ease;
  }
  #cover img{
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:cover;
  }
  #cover .enter-msg{
    position:absolute;
    bottom:8%;
    left:50%;
    transform:translateX(-50%);
    color:var(--parchment);
    background:rgba(20,14,8,.7);
    border:3px solid var(--accent);
    padding:14px 28px;
    font-size:18px;
    letter-spacing:2px;
    animation: blink 1.6s infinite;
    white-space:nowrap;
    z-index:2;
  }
  @keyframes blink{
    0%,100%{ opacity:1; }
    50%{ opacity:.35; }
  }
  #cover.hide{
    opacity:0;
    pointer-events:none;
  }

  /* ---------- GALLERY STAGE ---------- */
  #gallery{
    position:absolute; inset:0;
    background:#0a0f0a;
  }

  #stage-wrap{
    position:absolute; inset:0;
    width:100%; height:100%;
    overflow:hidden;
  }

  #bgImage{
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:cover;
    object-position:center;
    display:block;
    -webkit-user-drag:none;
    opacity:1;
    transition:opacity .25s ease;
  }
  #bgImage.fading{ opacity:0; }

  #charLayer{
    position:absolute; inset:0;
    width:100%; height:100%;
    pointer-events:none;
  }
  .char-sprite{
    position:absolute;
    transform:translate(-50%,-100%);
    cursor:pointer;
    pointer-events:auto;
    filter: drop-shadow(0 6px 6px rgba(0,0,0,.5));
    transition: filter .15s ease, transform .15s ease;
  }
  .char-sprite img{
    height:100%;
    width:auto;
    display:block;
    image-rendering: pixelated;
  }
  .char-sprite:hover{
    filter: drop-shadow(0 6px 6px rgba(0,0,0,.5)) brightness(1.25);
  }
  .char-sprite:active{
    transform:translate(-50%,-96%) scale(0.97);
  }
  .char-sprite::after{
    content:"";
    position:absolute;
    top:-14px; left:50%;
    transform:translateX(-50%);
    width:0; height:0;
    border-left:6px solid transparent;
    border-right:6px solid transparent;
    border-bottom:8px solid var(--accent);
    animation: bob 1.2s ease-in-out infinite;
    opacity:.9;
  }
  @keyframes bob{
    0%,100%{ transform:translate(-50%,0); }
    50%{ transform:translate(-50%,-5px); }
  }

  /* ---------- INFO BOX (time/location) ---------- */
  #infoBox{
    position:absolute;
    top:16px; left:16px;
    background:rgba(15,10,6,.78);
    border:3px solid var(--wood-light);
    box-shadow: inset 0 0 0 2px var(--wood-dark);
    color:var(--parchment);
    padding:10px 16px;
    font-size:14px;
    line-height:1.7;
    z-index:10;
    max-width:60vw;
  }
  #infoBox .loc{
    color:var(--accent);
    font-size:16px;
    display:block;
  }
  #infoBox .time{
    color:#bcd6c4;
    display:block;
  }

  /* ---------- NAV ARROWS ---------- */
  .nav-arrow{
    position:absolute;
    top:50%; transform:translateY(-50%);
    width:52px; height:52px;
    background:rgba(15,10,6,.7);
    border:3px solid var(--wood-light);
    color:var(--parchment);
    font-size:22px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    z-index:15;
    user-select:none;
  }
  .nav-arrow:hover{ background:rgba(224,161,58,.35); }
  .nav-arrow:active{ transform:translateY(-50%) scale(.92); }
  #prevBtn{ left:14px; }
  #nextBtn{ right:14px; }

  /* ---------- DOTS ---------- */
  #dots{
    position:absolute;
    bottom:14px; left:50%;
    transform:translateX(-50%);
    display:flex; gap:8px;
    z-index:15;
    background:rgba(15,10,6,.55);
    padding:8px 12px;
    border:2px solid var(--wood-light);
  }
  .dot{
    width:10px; height:10px;
    background:var(--wood-light);
    cursor:pointer;
    border:1px solid var(--wood-dark);
  }
  .dot.active{ background:var(--accent); }

  /* ---------- BACK TO COVER ---------- */
  #backBtn{
    position:absolute;
    top:16px; right:16px;
    z-index:15;
    background:rgba(15,10,6,.78);
    border:3px solid var(--wood-light);
    color:var(--parchment);
    padding:8px 14px;
    font-size:13px;
    cursor:pointer;
  }
  #backBtn:hover{ background:rgba(224,161,58,.35); }

  /* ---------- DIALOG (character speech box) ---------- */
  #dialogOverlay{
    position:fixed; inset:0;
    background:rgba(0,0,0,.6);
    display:none;
    align-items:center; justify-content:center;
    z-index:50;
  }
  #dialogOverlay.show{ display:flex; }

  #dialogBox{
    width:min(560px, 88vw);
    background:var(--parchment);
    border:6px solid var(--wood-dark);
    box-shadow:
      0 0 0 3px var(--wood-light) inset,
      0 10px 0 rgba(0,0,0,.4);
    padding:0;
    position:relative;
    font-family:'Galmuri11','Galmuri9',monospace;
    color:#2b1c12;
    max-height:80vh;
    overflow:hidden;
  }
  #dialogHeader{
    background:var(--wood-dark);
    color:var(--accent);
    padding:10px 16px;
    font-size:18px;
    letter-spacing:2px;
    border-bottom:4px solid var(--wood-light);
  }
  /* speech bubble with the character's one-liner */
  #quoteWrap{
    padding:16px 18px 6px 18px;
  }
  #speechBubble{
    position:relative;
    background:#fffdf6;
    border:3px solid var(--wood-dark);
    box-shadow: 0 0 0 2px var(--wood-light) inset;
    padding:12px 16px;
    font-size:15px;
    line-height:1.6;
    color:#2b1c12;
  }
  #speechBubble::before{
    content:"";
    position:absolute;
    left:28px;
    bottom:-13px;
    width:0; height:0;
    border-left:9px solid transparent;
    border-right:9px solid transparent;
    border-top:13px solid var(--wood-dark);
  }
  #speechBubble::after{
    content:"";
    position:absolute;
    left:31px;
    bottom:-8px;
    width:0; height:0;
    border-left:6px solid transparent;
    border-right:6px solid transparent;
    border-top:9px solid #fffdf6;
  }
  #speechBubble .quote-mark{
    color:var(--accent2);
    font-weight:bold;
  }

  #dialogBody{
    display:flex;
    gap:16px;
    padding:20px 18px 18px 18px;
    align-items:flex-start;
  }
  #dialogPortrait{
    width:110px; min-width:110px; height:auto;
    image-rendering: pixelated;
    background:rgba(0,0,0,.06);
    border:3px solid var(--wood-light);
  }
  #dialogFields{
    flex:1;
    font-size:15px;
    line-height:2;
  }
  #dialogFields .field-row{
    display:flex;
    border-bottom:2px dotted var(--wood-light);
    padding:4px 0;
  }
  #dialogFields .field-label{
    width:56px;
    color:var(--accent2);
    font-weight:bold;
    flex-shrink:0;
  }
  #dialogFields .field-value{
    color:#2b1c12;
  }
  #dialogClose{
    position:absolute;
    top:6px; right:8px;
    background:transparent;
    border:none;
    color:var(--accent);
    font-size:20px;
    cursor:pointer;
    line-height:1;
  }
  #dialogClose:hover{ color:#fff; }

  /* ---------- MOBILE ---------- */
  @media (max-width:700px){
    #infoBox{ font-size:11px; padding:7px 10px; max-width:70vw; top:8px; left:8px; }
    #infoBox .loc{ font-size:13px; }
    .nav-arrow{ width:40px; height:40px; font-size:16px; }
    #prevBtn{ left:6px; }
    #nextBtn{ right:6px; }
    #dots{ bottom:8px; padding:6px 8px; gap:6px; }
    .dot{ width:8px; height:8px; }
    #backBtn{ font-size:11px; padding:6px 10px; top:8px; right:8px; }
    #cover .enter-msg{ font-size:13px; padding:10px 18px; bottom:10%; }
    #dialogHeader{ font-size:15px; padding:8px 12px; }
    #quoteWrap{ padding:12px 12px 4px 12px; }
    #speechBubble{ font-size:13px; padding:10px 12px; }
    #dialogBody{ flex-direction:column; align-items:center; padding:14px; gap:10px; }
    #dialogPortrait{ width:90px; }
    #dialogFields{ font-size:13px; width:100%; }
  }
</style>
</head>
<body>

<div id="app">

  <!-- COVER PAGE -->
  <div id="cover">
    <img src="bg1.png" alt="MARUKA">
    <div class="enter-msg">클릭하여 부족의 마을로 들어가기 ▶</div>
  </div>

  <!-- GALLERY -->
  <div id="gallery">
    <button id="backBtn">◀ 첫 화면으로</button>
    <div id="infoBox">
      <span class="loc" id="locText">위치</span>
      <span class="time" id="timeText">시간</span>
    </div>

    <div id="stage-wrap">
      <img id="bgImage" src="" alt="location">
      <div id="charLayer"></div>
    </div>

    <div class="nav-arrow" id="prevBtn">&#10094;</div>
    <div class="nav-arrow" id="nextBtn">&#10095;</div>

    <div id="dots"></div>
  </div>

</div>

<!-- CHARACTER DIALOG -->
<div id="dialogOverlay">
  <div id="dialogBox">
    <button id="dialogClose">✕</button>
    <div id="dialogHeader">마루카 부족민</div>
    <div id="quoteWrap">
      <div id="speechBubble"><span class="quote-mark">“</span><span id="quoteText">-</span><span class="quote-mark">”</span></div>
    </div>
    <div id="dialogBody">
      <img id="dialogPortrait" src="" alt="character">
      <div id="dialogFields">
        <div class="field-row"><span class="field-label">이름</span><span class="field-value" id="fieldName">-</span></div>
        <div class="field-row"><span class="field-label">나이</span><span class="field-value" id="fieldAge">-</span></div>
        <div class="field-row"><span class="field-label">직업</span><span class="field-value" id="fieldJob">-</span></div>
      </div>
    </div>
  </div>
</div>

<script>
/* ======================================================================
   마루카 부족 캐릭터 데이터
   - name / age 는 비워두었습니다 ("미정"). 원하는 값으로 바꿔서 채워주세요.
   - job(직업)은 배경 스토리에 맞춰 임의로 지정했습니다. 자유롭게 수정 가능합니다.
   - quote(대사)는 캐릭터를 클릭했을 때 말풍선에 표시되는 한 마디입니다. 원하는 대사로 바꿔주세요.
   - left/top : 화면(배경) 안에서의 위치(%) → left는 캐릭터의 발 중심 x좌표, top은 발이 닿는 y좌표
   - height : 화면 세로 길이 대비 캐릭터의 키(%). 원본 이미지 크기가 제각각이라도
              height 기준으로 통일하면 화면상 실제 보이는 크기가 균일해집니다.
   ====================================================================== */
const locations = [
  {
    bg:"bg2.png",
    loc:"족장의 천막",
    time:"깊은 밤 (자정 무렵)",
    chars:[
      {img:"char12.png", left:50, top:92, height:38, name:"아키타르(Akitaar)", age:"39", job:"족장(추장)", quote:"나에게 남은 건 이 거친 살점과 흉터, 그리고 지켜야 할 무덤뿐이다."}
    ]
  },
  {
    bg:"bg3.png",
    loc:"부족장의 천막",
    time:"깊은 밤",
    chars:[
      {img:"char13.png", left:50, top:92, height:38, name:"미정", age:"미정", job:"부족장", quote:"미정"}
    ]
  },
  {
    bg:"bg4.png",
    loc:"전사 구역",
    time:"깊은 밤",
    chars:[
      {img:"char14.png", left:15, top:92, height:32, name:"샤르칸(SharKhan)", age:"21", job:"전사", quote:"미정"},
      {img:"char15.png", left:39, top:94, height:32, name:"카엘(Kael)", age:"27", job:"전사", quote:"재미있는 외부인이 생겨서 다행이야. 심심할 뻔했거든."},
      {img:"char16.png", left:63, top:92, height:34, name:"타맥(Tamak)", age:"20", job:"전사", quote:"미정"},
      {img:"char17.png", left:87, top:94, height:32, name:"시아(Si'ah)", age:"24", job:"여전사", quote:"넌 그냥 묶인채로 예쁘게 싸기만 하면 돼^^"}
    ]
  },
  {
    bg:"bg5.png",
    loc:"농경지·목축 구역",
    time:"동틀 무렵 (새벽)",
    chars:[
      {img:"char18.png", left:34, top:94, height:34, name:"아콰(Akwa)", age:"24", job:"농부", quote:"표정이 왜 그래? 아래는 벌써 터질 것 같으면서."},
      {img:"char19.png", left:66, top:94, height:34, name:"아혼타(Ahonta)", age:"28", job:"농부", quote:"그렇게 눈치 보지 마. 이 귀한 약초 다 밟아놓은 대가는 몸으로 천천히 치르면 돼."}
    ]
  },
  {
    bg:"bg6.png",
    loc:"약초막",
    time:"이른 아침",
    chars:[
      {img:"char20.png", left:50, top:94, height:36, name:"체탄", age:"32", job:"주술사", quote:"…왔냐. 저기 가서 약초나 좀 찧어놔라, 형 졸리니까."}
    ]
  },
  {
    bg:"bg7.png",
    loc:"공동 취사장",
    time:"노을 지는 저녁",
    chars:[
      {img:"char21.png", left:16, top:94, height:32, name:"에란", age:"23", job:"요리사", quote:"……배고프셨죠."}
    ]
  },
  {
    bg:"bg8.png",
    loc:"사냥꾼 구역",
    time:"노을 지는 저녁",
    chars:[
      {img:"char22.png", left:26, top:94, height:32, name:"월로", age:"37", job:"사냥꾼", quote:"미정"},
      {img:"char23.png", left:74, top:94, height:32, name:"토와크(Towak)", age:"26", job:"사냥꾼", quote:"윌로? 그 늙은이꺼보다는 내 께 더 맛있을걸."}
    ]
  },
  {
    bg:"bg9.png",
    loc:"성역의 숲",
    time:"노을 지는 저녁",
    chars:[
      {img:"char24.png", left:24, top:92, height:34, name:"루마이(Rumai)", age:"22", job:"숲지기·길잡이", quote:"..."},
      {img:"char25.png", left:76, top:92, height:34, name:"세이(Sei)", age:"26", job:"제사장", quote:"이건 신성한 행위입니다. 혀 움직이세요, 얼른."}
    ]
  },
  {
    bg:"bg10.png",
    loc:"대장간",
    time:"한낮",
    chars:[
      {img:"DOHA.webp", left:50, top:94, height:36, name:"볼가(Volga)", age:"41", job:"대장장이", quote:"크하하하, 야 맹꽁이. 너 이게 어떤 딜돈지 알아? 이게 내 20살 크기야. 마루카에서 제일 잘 나가는거라고."}
    ]
  },
  {
    bg:"bg11.png",
    loc:"붉은 천막 구역",
    time:"깊은 밤 (축제)",
    chars:[
      {img:"char27.png", left:50, top:94, height:34, name:"노딘(Nodin)", age:"32", job:"매춘부", quote:"긴장 풀어요. 힘 잔뜩 줘봤자 아프기밖에 더 해?"}
    ]
  }
];

let current = 0;

const cover = document.getElementById('cover');
const gallery = document.getElementById('gallery');
const bgImage = document.getElementById('bgImage');
const charLayer = document.getElementById('charLayer');
const locText = document.getElementById('locText');
const timeText = document.getElementById('timeText');
const dotsWrap = document.getElementById('dots');
const stageWrap = document.getElementById('stage-wrap');

const dialogOverlay = document.getElementById('dialogOverlay');
const dialogClose = document.getElementById('dialogClose');
const dialogPortrait = document.getElementById('dialogPortrait');
const fieldName = document.getElementById('fieldName');
const fieldAge = document.getElementById('fieldAge');
const fieldJob = document.getElementById('fieldJob');
const quoteText = document.getElementById('quoteText');

// build dots
locations.forEach((_, i)=>{
  const d = document.createElement('div');
  d.className = 'dot' + (i===0 ? ' active' : '');
  d.addEventListener('click', ()=> goTo(i));
  dotsWrap.appendChild(d);
});

function updateDots(){
  [...dotsWrap.children].forEach((d,i)=>{
    d.classList.toggle('active', i===current);
  });
}

function renderScene(index, animate){
  const scene = locations[index];

  const draw = ()=>{
    bgImage.src = scene.bg;
    locText.textContent = "위치: " + scene.loc;
    timeText.textContent = "시간: " + scene.time;

    charLayer.innerHTML = "";
    scene.chars.forEach(c=>{
      const wrap = document.createElement('div');
      wrap.className = 'char-sprite';
      wrap.style.left = c.left + "%";
      wrap.style.top = c.top + "%";
      wrap.style.height = c.height + "%";
      const img = document.createElement('img');
      img.src = c.img;
      wrap.appendChild(img);
      wrap.addEventListener('click', ()=> openDialog(c));
      charLayer.appendChild(wrap);
    });
  };

  if(animate){
    bgImage.classList.add('fading');
    setTimeout(()=>{
      draw();
      bgImage.classList.remove('fading');
    }, 180);
  }else{
    draw();
  }

  updateDots();
}

function goTo(index){
  current = (index + locations.length) % locations.length;
  renderScene(current, true);
}

document.getElementById('prevBtn').addEventListener('click', ()=> goTo(current-1));
document.getElementById('nextBtn').addEventListener('click', ()=> goTo(current+1));

document.addEventListener('keydown', (e)=>{
  if(gallery.style.display === 'none') return;
  if(e.key === 'ArrowLeft') goTo(current-1);
  if(e.key === 'ArrowRight') goTo(current+1);
  if(e.key === 'Escape') closeDialog();
});

// swipe support
let touchStartX = null;
stageWrap.addEventListener('touchstart', (e)=>{
  touchStartX = e.changedTouches[0].clientX;
}, {passive:true});
stageWrap.addEventListener('touchend', (e)=>{
  if(touchStartX === null) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  if(Math.abs(dx) > 40){
    if(dx < 0) goTo(current+1);
    else goTo(current-1);
  }
  touchStartX = null;
}, {passive:true});

// dialog
function openDialog(c){
  dialogPortrait.src = c.img;
  fieldName.textContent = c.name || "-";
  fieldAge.textContent = c.age || "-";
  fieldJob.textContent = c.job || "-";
  quoteText.textContent = c.quote || "...";
  dialogOverlay.classList.add('show');
}
function closeDialog(){
  dialogOverlay.classList.remove('show');
}
dialogClose.addEventListener('click', closeDialog);
dialogOverlay.addEventListener('click', (e)=>{
  if(e.target === dialogOverlay) closeDialog();
});

document.getElementById('backBtn').addEventListener('click', ()=>{
  cover.classList.remove('hide');
});

// cover -> gallery
cover.addEventListener('click', ()=>{
  cover.classList.add('hide');
  renderScene(0, false);
});
</script>
</body>
</html>
